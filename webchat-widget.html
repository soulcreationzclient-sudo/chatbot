<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Chat Widget</title>
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
        }

        /* Chat launcher button */
        .chat-launcher {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            box-shadow: 0 4px 20px rgba(0, 123, 255, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            z-index: 10000;
        }

        .chat-launcher:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(0, 123, 255, 0.5);
        }

        .chat-launcher svg {
            width: 28px;
            height: 28px;
            fill: white;
            transition: transform 0.3s ease;
        }

        .chat-launcher.opened svg {
            transform: rotate(45deg);
        }

        /* Chat window */
        .chat-window {
            position: fixed;
            bottom: 100px;
            right: 24px;
            width: 400px;
            max-width: calc(100vw - 48px);
            height: 600px;
            max-height: calc(100vh - 120px);
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 10000;
        }

        .chat-window.opened {
            opacity: 1;
            transform: translateY(0) scale(1);
            visibility: visible;
        }

        /* Chat header */
        .chat-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chat-header-icon {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-header-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .chat-header-subtitle {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-header-close {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .chat-header-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .chat-header-close svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        /* Language selector */
        .language-selector {
            padding: 12px 24px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 8px;
        }

        .language-btn {
            flex: 1;
            padding: 10px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #666;
        }

        .language-btn:hover {
            border-color: #007bff;
            color: #007bff;
        }

        .language-btn.active {
            background: #007bff;
            border-color: #007bff;
            color: white;
        }

        /* Messages container */
        .chat-messages {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        /* Message bubbles */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: messageIn 0.3s ease;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
        }

        .message.bot .message-content {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.user .message-content {
            background: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            padding: 0 4px;
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 14px 18px;
            background: #f0f0f0;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator.active {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-6px);
            }
        }

        /* Input area */
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #eee;
            background: white;
        }

        .chat-input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: #f5f5f5;
            border-radius: 24px;
            padding: 8px 8px 8px 16px;
        }

        .input-action-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .input-action-btn:hover {
            background: #e8e8e8;
        }

        .input-action-btn svg {
            width: 20px;
            height: 20px;
            fill: #666;
        }

        .chat-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15px;
            resize: none;
            max-height: 100px;
            line-height: 1.4;
            padding: 8px 0;
        }

        .chat-input:focus {
            outline: none;
        }

        .chat-input::placeholder {
            color: #999;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: #007bff;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #0056b3;
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
            margin-left: 2px;
        }

        /* Welcome message */
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .welcome-message svg {
            width: 64px;
            height: 64px;
            fill: #ddd;
            margin-bottom: 16px;
        }

        .welcome-message h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 8px;
        }

        .welcome-message p {
            font-size: 14px;
            color: #999;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .chat-window {
                bottom: 0;
                right: 0;
                width: 100%;
                max-width: 100%;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
            }

            .chat-launcher {
                bottom: 16px;
                right: 16px;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            .chat-window {
                background: #1a1a1a;
            }

            .chat-header {
                background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            }

            .language-selector {
                background: #2a2a2a;
                border-color: #333;
            }

            .language-btn {
                background: #333;
                border-color: #444;
                color: #ccc;
            }

            .language-btn:hover {
                border-color: #007bff;
                color: #007bff;
            }

            .language-btn.active {
                background: #007bff;
                color: white;
            }

            .chat-messages {
                background: #1a1a1a;
            }

            .message.bot .message-content {
                background: #333;
                color: #eee;
            }

            .message.user .message-content {
                background: #007bff;
                color: white;
            }

            .typing-indicator {
                background: #333;
            }

            .typing-dot {
                background: #999;
            }

            .chat-input-area {
                background: #1a1a1a;
                border-color: #333;
            }

            .chat-input-wrapper {
                background: #333;
            }

            .input-action-btn:hover {
                background: #444;
            }

            .input-action-btn svg {
                fill: #ccc;
            }

            .chat-input {
                color: #eee;
            }

            .chat-input::placeholder {
                color: #777;
            }
        }
    </style>
</head>

<body>
    <!-- Chat Launcher Button -->
    <div class="chat-launcher" id="chatLauncher" title="Open Chat">
        <svg viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z" />
        </svg>
    </div>

    <!-- Chat Window -->
    <div class="chat-window" id="chatWindow">
        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
                </svg>
            </div>
            <div class="chat-header-info">
                <div class="chat-header-title">Chat with us</div>
                <div class="chat-header-subtitle">We typically reply within minutes</div>
            </div>
            <button class="chat-header-close" id="closeChat">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                </svg>
            </button>
        </div>

        <!-- Language Selector -->
        <div class="language-selector">
            <button class="language-btn active" data-lang="en">English</button>
            <button class="language-btn" data-lang="ar">العربية</button>
        </div>

        <!-- Messages Container -->
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message" id="welcomeMessage">
                <svg viewBox="0 0 24 24">
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
                </svg>
                <h3>Welcome!</h3>
                <p>How can we help you today?</p>
            </div>
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <div class="chat-input-wrapper">
                <button class="input-action-btn" id="attachBtn" title="Attach file">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z" />
                    </svg>
                </button>
                <button class="input-action-btn" id="voiceBtn" title="Voice input">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z" />
                    </svg>
                </button>
                <textarea class="chat-input" id="chatInput" placeholder="Type your message..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn" disabled>
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // WebChat Widget Configuration
        const CONFIG = {
            apiBaseUrl: '/api/webchat',
            autoOpen: false,
            welcomeDelay: 500,
            typingDelay: 1000
        };

        // State
        let state = {
            isOpen: false,
            sessionId: null,
            currentLang: 'en',
            isTyping: false,
            welcomeShown: false
        };

        // DOM Elements
        const elements = {
            launcher: document.getElementById('chatLauncher'),
            window: document.getElementById('chatWindow'),
            closeBtn: document.getElementById('closeChat'),
            messages: document.getElementById('chatMessages'),
            welcome: document.getElementById('welcomeMessage'),
            typing: document.getElementById('typingIndicator'),
            input: document.getElementById('chatInput'),
            sendBtn: document.getElementById('sendBtn'),
            attachBtn: document.getElementById('attachBtn'),
            voiceBtn: document.getElementById('voiceBtn'),
            langBtns: document.querySelectorAll('.language-btn')
        };

        // Initialize
        function init() {
            setupEventListeners();
            autoResizeTextarea();
            loadSavedSession();
        }

        // Event Listeners
        function setupEventListeners() {
            // Launcher toggle
            elements.launcher.addEventListener('click', toggleChat);
            elements.closeBtn.addEventListener('click', closeChat);

            // Language selection
            elements.langBtns.forEach(btn => {
                btn.addEventListener('click', () => selectLanguage(btn.dataset.lang));
            });

            // Send message
            elements.sendBtn.addEventListener('click', sendMessage);
            elements.input.addEventListener('keydown', handleInputKeydown);
            elements.input.addEventListener('input', handleInputChange);

            // File attachment
            elements.attachBtn.addEventListener('click', handleFileAttach);

            // Voice input
            elements.voiceBtn.addEventListener('click', handleVoiceInput);
        }

        // Load saved session from localStorage
        async function loadSavedSession() {
            const savedSessionId = localStorage.getItem('webchatSessionId');
            if (!savedSessionId) return;

            try {
                const response = await fetch(`${CONFIG.apiBaseUrl}/messages/${savedSessionId}/`);
                const data = await response.json();

                if (data.success && data.session && data.session.status === 'active') {
                    state.sessionId = savedSessionId;
                    state.welcomeShown = true;

                    // Hide the static welcome placeholder
                    elements.welcome.style.display = 'none';

                    // Restore all past messages into the UI
                    if (data.messages && data.messages.length > 0) {
                        data.messages.forEach(msg => {
                            addMessage(msg.content || '', msg.sender === 'user' ? 'user' : 'bot');
                        });
                    }
                } else {
                    // Session ended or invalid — clear it
                    localStorage.removeItem('webchatSessionId');
                }
            } catch (error) {
                console.error('Failed to restore session:', error);
                localStorage.removeItem('webchatSessionId');
            }
        }

        // Toggle chat window
        function toggleChat() {
            state.isOpen = !state.isOpen;
            elements.window.classList.toggle('opened', state.isOpen);
            elements.launcher.classList.toggle('opened', state.isOpen);

            if (state.isOpen && !state.welcomeShown) {
                startSession();
            }
        }

        // Close chat window
        function closeChat() {
            state.isOpen = false;
            elements.window.classList.remove('opened');
            elements.launcher.classList.remove('opened');
        }

        // Start chat session
        async function startSession() {
            try {
                const response = await fetch(`${CONFIG.apiBaseUrl}/start/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        language: state.currentLang
                    })
                });

                const data = await response.json();

                if (data.success) {
                    state.sessionId = data.session.id;
                    state.welcomeShown = true;

                    // Persist session ID so history survives page reloads
                    localStorage.setItem('webchatSessionId', data.session.id);

                    // Hide welcome message and show bot's welcome
                    elements.welcome.style.display = 'none';
                    addMessage(data.welcome_message.content, 'bot');
                }
            } catch (error) {
                console.error('Failed to start session:', error);
                // Fallback: show welcome message locally
                elements.welcome.style.display = 'none';
                addMessage('Welcome! How can we help you today?', 'bot');
            }
        }

        // Select language
        async function selectLanguage(lang) {
            state.currentLang = lang;

            // Update UI
            elements.langBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });

            // Update session language if exists
            if (state.sessionId) {
                try {
                    await fetch(`${CONFIG.apiBaseUrl}/language/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            session_id: state.sessionId,
                            language: lang
                        })
                    });
                } catch (error) {
                    console.error('Failed to update language:', error);
                }
            }

            // Update welcome message
            const welcomeMessages = {
                'en': 'Welcome! How can we help you today?',
                'ar': 'مرحبا! كيف يمكننا مساعدتك اليوم؟',
                'both': 'Welcome! How can we help you today?\nمرحبا! كيف يمكننا مساعدتك اليوم؟'
            };

            // Clear existing messages and show new welcome
            const messages = elements.messages.querySelectorAll('.message');
            messages.forEach(msg => msg.remove());

            addMessage(welcomeMessages[lang] || welcomeMessages['en'], 'bot');
        }

        // Handle input keydown
        function handleInputKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (e.target.value.trim()) {
                    sendMessage();
                }
            }
        }

        // Handle input change
        function handleInputChange() {
            autoResizeTextarea();
            elements.sendBtn.disabled = !elements.input.value.trim();
        }

        // Auto-resize textarea
        function autoResizeTextarea() {
            elements.input.style.height = 'auto';
            elements.input.style.height = Math.min(elements.input.scrollHeight, 100) + 'px';
        }

        // Send message
        async function sendMessage() {
            const message = elements.input.value.trim();
            if (!message || !state.sessionId) return;

            // Clear input
            elements.input.value = '';
            elements.sendBtn.disabled = true;
            autoResizeTextarea();

            // Add user message
            addMessage(message, 'user');

            // Show typing indicator
            showTyping();

            try {
                const response = await fetch(`${CONFIG.apiBaseUrl}/message/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        session_id: state.sessionId,
                        message: message,
                        content_type: 'text'
                    })
                });

                const data = await response.json();

                // Hide typing indicator
                hideTyping();

                if (data.success) {
                    addMessage(data.bot_message.content, 'bot', data.bot_message.images || []);
                } else {
                    addMessage('Sorry, something went wrong. Please try again.', 'bot');
                }
            } catch (error) {
                console.error('Failed to send message:', error);
                hideTyping();
                addMessage('Sorry, I could not connect to the server. Please try again.', 'bot');
            }
        }

        // Add message to chat
        function addMessage(content, sender, images) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            // Handle multiline messages
            let formattedContent = content.replace(/\n/g, '<br>');

            // Render images if present
            if (images && images.length > 0 && sender === 'bot') {
                formattedContent += '<div style="margin-top: 8px;">';
                images.forEach(img => {
                    formattedContent += `<a href="${img.url}" target="_blank" style="display:block; margin-top:6px;"><img src="${img.url}" alt="${img.name}" style="max-width:100%; max-height:250px; border-radius:8px; cursor:pointer;"></a>`;
                });
                formattedContent += '</div>';
            }

            messageDiv.innerHTML = `
                <div class="message-content">${formattedContent}</div>
                <div class="message-time">${formatTime(new Date())}</div>
            `;

            // Insert before typing indicator
            elements.messages.insertBefore(messageDiv, elements.typing);

            // Scroll to bottom
            scrollToBottom();
        }

        // Show typing indicator
        function showTyping() {
            state.isTyping = true;
            elements.typing.classList.add('active');
            scrollToBottom();
        }

        // Hide typing indicator
        function hideTyping() {
            state.isTyping = false;
            elements.typing.classList.remove('active');
        }

        // Scroll to bottom
        function scrollToBottom() {
            elements.messages.scrollTop = elements.messages.scrollHeight;
        }

        // Format time
        function formatTime(date) {
            return date.toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }

        // Handle file attachment
        function handleFileAttach() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,.pdf,.doc,.docx';
            input.multiple = false;

            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    // TODO: Implement file upload
                    addMessage(`File attached: ${file.name}`, 'user');
                }
            };

            input.click();
        }

        // Handle voice input
        function handleVoiceInput() {
            // TODO: Implement voice input using Web Speech API
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();

                recognition.lang = state.currentLang === 'ar' ? 'ar-SA' : 'en-US';
                recognition.interimResults = false;

                recognition.onstart = () => {
                    elements.voiceBtn.style.fill = '#007bff';
                };

                recognition.onend = () => {
                    elements.voiceBtn.style.fill = '#666';
                };

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    elements.input.value = transcript;
                    handleInputChange();
                };

                recognition.start();
            } else {
                addMessage('Voice input is not supported in your browser.', 'bot');
            }
        }

        // Initialize on DOM ready
        document.addEventListener('DOMContentLoaded', init);

        // Also initialize immediately if DOM is already ready
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            init();
        }
    </script>
</body>

</html>
