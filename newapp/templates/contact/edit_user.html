{% extends "layouts/base.html" %}
{% load static %}
{% block title %}Edit User{% endblock %}

{% block head_css %}
<style>
  :root {
    --bg-page: #f8fafc;
    --bg-card: #ffffff;
    --border-soft: #e5e7eb;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --accent: #3b82f6;
    --success: #22c55e;
  }

  .edit-user-wrap {
    padding: 32px;
  }

  .edit-wrap {
    max-width: 520px;
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
  }

  h2 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--text-main);
  }

  form p {
    margin-bottom: 16px;
  }

  label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-main);
    display: block;
    margin-bottom: 6px;
  }

  input,
  select,
  textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border-soft);
    font-size: 14px;
    background: #ffffff;
    box-sizing: border-box;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
  }

  .form-actions {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }

  .btn {
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    border: none;
  }

  .btn-primary {
    background: var(--success);
    color: #ffffff;
  }

  .btn-primary:hover {
    background: #16a34a;
  }

  .btn-secondary {
    background: #e5e7eb;
    color: #111827;
  }

  .btn-secondary:hover {
    background: #d1d5db;
  }

  @media (max-width: 768px) {
    .edit-user-wrap {
      padding: 16px;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="edit-user-wrap">
  <div class="edit-wrap">
    <h2>Edit User: {{ user.name }}</h2>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <div class="form-actions">
        
        <hr class="my-4">
        <h5>Custom Fields</h5>
        {% for field in custom_fields %}
        <div class="mb-3">
            <label class="form-label">{{ field.name }}</label>
            <input type="{{ field.field_type }}" class="form-control" name="custom_field_{{ field.id }}" 
                   value="{{ field.value|default:'' }}">
        </div>
        {% endfor %}
            
<button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'contact_dashboard' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
