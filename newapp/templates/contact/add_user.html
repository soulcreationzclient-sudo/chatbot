{% extends "layouts/base.html" %}
{% load static %}
{% block title %}Add User{% endblock %}

{% block head_css %}
<style>
  :root {
    --bg-page: #f8fafc;
    --bg-card: #ffffff;
    --border-soft: #e5e7eb;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --accent: #3b82f6;
    --accent-soft: #e0edff;
    --success: #22c55e;
  }

  .add-user-wrap {
    padding: 32px;
    max-width: 900px;
  }

  h2 {
    margin-bottom: 24px;
    font-size: 24px;
    font-weight: 600;
    color: var(--text-main);
  }

  form {
    width: 100%;
    background: var(--bg-card);
    padding: 36px;
    border-radius: 18px;
    border: 1px solid var(--border-soft);
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
  }

  label {
    font-size: 14px;
    font-weight: 500;
    display: block;
    margin: 18px 0 8px;
    color: var(--text-main);
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    font-size: 15px;
    background: #ffffff;
    transition: border 0.2s ease, box-shadow 0.2s ease;
    box-sizing: border-box;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
  }

  button {
    margin-top: 28px;
    padding: 14px 26px;
    background-color: #3b82f6;
    border: none;
    color: #ffffff;
    font-size: 15px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease;
  }

  button:hover {
    background-color: #16a34a;
  }

  button:active {
    transform: scale(0.97);
  }

  @media (max-width: 768px) {
    .add-user-wrap {
      padding: 16px;
    }

    form {
      padding: 24px;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="add-user-wrap">
  {% include 'components/flash.html' %}

  <h2>Add User</h2>

  <form method="post" action="{% url 'add_admin_user' %}">
    {% csrf_token %}

    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>

    <label for="phone_no">Phone Number</label>
    <input type="text" id="phone_no" name="phone_no" required placeholder="919994780436">

    <button type="submit">Submit</button>
  </form>
</div>
{% endblock %}
