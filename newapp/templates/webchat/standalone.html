<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ widget.name }} - Chat</title>
    <meta name="description" content="Chat with {{ org_name }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 90vh;
            max-height: 700px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: {{ widget.primary_color|default:"#007bff" }};
            color: #fff;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            width: 34px; height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .session-badge {
            display: none;
            font-size: 10px;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: auto;
            font-family: monospace;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .session-badge:hover { background: rgba(255,255,255,0.35); }
        .session-badge.visible { display: inline-block; }
        .chat-header .avatar {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 600;
        }
        .chat-header .info h2 { font-size: 16px; font-weight: 600; }
        .chat-header .info span { font-size: 12px; opacity: 0.85; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f7f8fc;
        }
        .message {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.bot {
            background: #fff;
            color: #333;
            border: 1px solid #e8e8e8;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .message.user {
            background: {{ widget.primary_color|default:"#007bff" }};
            color: #fff;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }
        .message .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            display: block;
        }
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 12px 20px;
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }
        .typing-indicator.active { display: flex; gap: 4px; align-items: center; }
        .typing-indicator span {
            width: 7px; height: 7px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
        .chat-input {
            display: flex;
            padding: 16px;
            gap: 10px;
            border-top: 1px solid #eee;
            background: #fff;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 24px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .chat-input input:focus {
            border-color: {{ widget.primary_color|default:"#007bff" }};
        }
        .chat-input button {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: none;
            background: {{ widget.primary_color|default:"#007bff" }};
            color: #fff;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s, opacity 0.2s;
            flex-shrink: 0;
        }
        .chat-input button:hover { transform: scale(1.05); }
        .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }
        .chat-input button svg { width: 20px; height: 20px; }
        .powered-by {
            text-align: center;
            padding: 8px;
            font-size: 11px;
            color: #999;
            background: #fff;
        }
        .msg-image { max-width: 100%; border-radius: 8px; margin-top: 8px; }
        /* Mobile */
        @media (max-width: 520px) {
            body { padding: 0; }
            .chat-container {
                max-width: 100%;
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <button class="back-btn" onclick="window.history.length > 1 ? window.history.back() : window.close()" title="Go back">←</button>
            <div class="avatar">{{ org_name_initial }}</div>
            <div class="info">
                <h2>{{ org_name }}</h2>
                <span>● Online</span>
            </div>
            <span class="session-badge" id="sessionBadge" title="Click to copy session ID"></span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13"></path>
                    <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
                </svg>
            </button>
        </div>
        <div class="powered-by">Powered by SpeedBots</div>
    </div>

    <script>
        const API_BASE = '{{ api_base }}';
        const ORG_ID = '{{ org_id }}';
        const ADMIN_ID = '{{ admin_id }}';
        let sessionId = null;
        let sending = false;

        async function startSession() {
            try {
                const res = await fetch(API_BASE + '/api/webchat/start/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        organization_id: ORG_ID || null,
                        admin_id: ADMIN_ID || null,
                        language: 'en',
                        visitor_name: 'Web Visitor'
                    })
                });
                const data = await res.json();
                if (data.success) {
                    sessionId = data.session.id;
                    // Show session ID badge
                    const badge = document.getElementById('sessionBadge');
                    const shortId = sessionId.substring(0, 8).toUpperCase();
                    badge.textContent = 'ID: ' + shortId;
                    badge.classList.add('visible');
                    badge.onclick = function() {
                        navigator.clipboard.writeText(sessionId).then(() => {
                            badge.textContent = 'Copied!';
                            setTimeout(() => { badge.textContent = 'ID: ' + shortId; }, 1500);
                        });
                    };
                    if (data.welcome_message) {
                        addMessage(data.welcome_message.content, 'bot');
                    }
                }
            } catch(e) {
                addMessage('Unable to connect. Please try again later.', 'bot');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || sending || !sessionId) return;

            input.value = '';
            addMessage(text, 'user');
            sending = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('typingIndicator').classList.add('active');
            scrollToBottom();

            try {
                const res = await fetch(API_BASE + '/api/webchat/message/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: text,
                        content_type: 'text'
                    })
                });
                const data = await res.json();
                document.getElementById('typingIndicator').classList.remove('active');
                if (data.success && data.bot_message) {
                    addMessage(data.bot_message.content, 'bot');
                    if (data.bot_message.images && data.bot_message.images.length > 0) {
                        data.bot_message.images.forEach(img => {
                            addImage(img.url, img.name);
                        });
                    }
                }
            } catch(e) {
                document.getElementById('typingIndicator').classList.remove('active');
                addMessage('Sorry, something went wrong. Please try again.', 'bot');
            }
            sending = false;
            document.getElementById('sendBtn').disabled = false;
        }

        function addMessage(text, sender) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message ' + sender;
            // Simple markdown-like formatting
            let html = text.replace(/\n/g, '<br>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            const now = new Date();
            const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
            div.innerHTML = html + '<span class="time">' + time + '</span>';
            container.appendChild(div);
            scrollToBottom();
        }

        function addImage(url, name) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = '<img src="' + url + '" alt="' + (name||'image') + '" class="msg-image">';
            container.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
        }

        // Enter key to send
        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Start session on load
        startSession();
    </script>
</body>
</html>
