<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ widget.name }} - Chat</title>
    <meta name="description" content="Chat with {{ org_name }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 90vh;
            max-height: 700px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: {{ widget.primary_color|default:"#007bff" }};
            color: #fff;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            width: 34px; height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .session-badge {
            display: none;
            font-size: 10px;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: auto;
            font-family: monospace;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .session-badge:hover { background: rgba(255,255,255,0.35); }
        .session-badge.visible { display: inline-block; }
        .chat-header .avatar {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 600;
        }
        .chat-header .info h2 { font-size: 16px; font-weight: 600; }
        .chat-header .info span { font-size: 12px; opacity: 0.85; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f7f8fc;
        }
        .message {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.bot {
            background: #fff;
            color: #333;
            border: 1px solid #e8e8e8;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .message.user {
            background: {{ widget.primary_color|default:"#007bff" }};
            color: #fff;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }
        .message .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            display: block;
        }
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 12px 20px;
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }
        .typing-indicator.active { display: flex; gap: 4px; align-items: center; }
        .typing-indicator span {
            width: 7px; height: 7px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
        .chat-input {
            display: flex;
            padding: 16px;
            gap: 10px;
            border-top: 1px solid #eee;
            background: #fff;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 24px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .chat-input input:focus {
            border-color: {{ widget.primary_color|default:"#007bff" }};
        }
        .chat-input button {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: none;
            background: {{ widget.primary_color|default:"#007bff" }};
            color: #fff;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s, opacity 0.2s;
            flex-shrink: 0;
        }
        .chat-input button:hover { transform: scale(1.05); }
        .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }
        .chat-input button svg { width: 20px; height: 20px; }
        .action-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #999;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, color 0.2s;
            flex-shrink: 0;
        }
        .action-btn:hover { background: #f0f0f0; color: #555; }
        .action-btn svg { width: 20px; height: 20px; }
        .action-btn.recording { background: #ef4444; color: #fff; animation: pulse-rec 1.5s infinite; }
        @keyframes pulse-rec {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
        }
        .voice-preview {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: #f0f4ff;
            border-top: 1px solid #e0e0e0;
        }
        .voice-preview.active { display: flex; }
        .voice-preview audio { flex: 1; height: 36px; }
        .vp-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: transform 0.15s;
        }
        .vp-btn:hover { transform: scale(1.1); }
        .vp-send { background: #22c55e; color: #fff; }
        .vp-delete { background: #ef4444; color: #fff; }
        .recording-bar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: #fef2f2;
            border-top: 1px solid #fca5a5;
        }
        .recording-bar.active { display: flex; }
        .rec-dot { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; animation: pulse-rec 1s infinite; }
        .recording-bar span { flex: 1; font-size: 14px; color: #b91c1c; font-weight: 500; }
        .recording-bar button {
            padding: 6px 16px; border-radius: 20px; border: none;
            background: #ef4444; color: #fff; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .recording-bar button:hover { background: #dc2626; }
        .powered-by {
            text-align: center;
            padding: 8px;
            font-size: 11px;
            color: #999;
            background: #fff;
        }
        .msg-image { max-width: 100%; border-radius: 8px; margin-top: 8px; }
        /* Mobile */
        @media (max-width: 520px) {
            body { padding: 0; }
            .chat-container {
                max-width: 100%;
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <button class="back-btn" onclick="window.history.length > 1 ? window.history.back() : window.close()" title="Go back">←</button>
            <div class="avatar">{{ org_name_initial }}</div>
            <div class="info">
                <h2>{{ org_name }}</h2>
                <span>● Online</span>
            </div>
            <span class="session-badge" id="sessionBadge" title="Click to copy session ID"></span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>
        <!-- Recording indicator bar -->
        <div class="recording-bar" id="recordingBar">
            <div class="rec-dot"></div>
            <span id="recTimer">Recording... 0:00</span>
            <button onclick="stopRecording()">⏹ Stop</button>
        </div>
        <!-- Voice preview bar (after recording) -->
        <div class="voice-preview" id="voicePreview">
            <audio id="previewAudio" controls style="flex:1;height:36px;"></audio>
            <button class="vp-btn vp-send" onclick="sendVoicePreview()" title="Send">▶</button>
            <button class="vp-btn vp-delete" onclick="discardVoicePreview()" title="Delete">✕</button>
        </div>
        <!-- Normal input bar -->
        <div class="chat-input" id="chatInputBar">
            <input type="file" id="fileInput" style="display:none" accept="image/*,audio/*,.pdf,.doc,.docx">
            <button class="action-btn" id="attachBtn" onclick="document.getElementById('fileInput').click()" title="Attach file">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button class="action-btn" id="voiceBtn" onclick="startRecording()" title="Record voice note">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
            <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13"></path>
                    <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
                </svg>
            </button>
        </div>
        <div class="powered-by">Powered by SpeedBots</div>
    </div>

    <script>
        // Support both Django rendering AND static HTML deployments
        const urlParams = new URLSearchParams(window.location.search);
        
        // Django template injects values, but if hosted raw, they stay as '{{ ... }}'
        let rawApiBase = '{{ api_base }}';
        let rawOrgId = '{{ org_id }}';
        let rawAdminId = '{{ admin_id }}';
        
        let API_BASE = (rawApiBase && !rawApiBase.includes('{{')) ? rawApiBase : window.location.origin;
        // If they specify api_base in URL, prioritize that (useful for external static hosting)
        if (urlParams.has('api_base')) API_BASE = urlParams.get('api_base');
        if (API_BASE === window.location.origin) API_BASE = ''; // Relative path if same domain
        
        // Use URL params if present, fallback to django injected, else null
        const WIDGET_ID = urlParams.get('widget_id') || urlParams.get('w') || '';
        const ORG_ID = urlParams.get('org_id') || (!(rawOrgId.includes('{{')) ? rawOrgId : null);
        const ADMIN_ID = urlParams.get('admin_id') || (!(rawAdminId.includes('{{')) ? rawAdminId : null);

        let sessionId = null;
        let sending = false;
        const STORAGE_KEY = 'speedbot_session_' + (ORG_ID || ADMIN_ID || 'default');

        function showSessionBadge(sid) {
            const badge = document.getElementById('sessionBadge');
            const shortId = sid.substring(0, 8).toUpperCase();
            badge.textContent = 'ID: ' + shortId;
            badge.classList.add('visible');
            badge.onclick = function() {
                navigator.clipboard.writeText(sid).then(() => {
                    badge.textContent = 'Copied!';
                    setTimeout(() => { badge.textContent = 'ID: ' + shortId; }, 1500);
                });
            };
        }

        async function resumeSession(storedId) {
            try {
                const res = await fetch(API_BASE + '/api/webchat/messages/' + storedId + '/');
                const data = await res.json();
                if (data.success && data.messages) {
                    sessionId = storedId;
                    showSessionBadge(sessionId);
                    data.messages.forEach(m => {
                        addMessage(m.content, m.sender === 'user' ? 'user' : 'bot', m.created_at);
                    });
                    return true;
                }
            } catch(e) { /* fall through to new session */ }
            return false;
        }

        async function startSession() {
            // Try to resume existing session from localStorage
            const storedId = localStorage.getItem(STORAGE_KEY);
            if (storedId) {
                const resumed = await resumeSession(storedId);
                if (resumed) return;
                localStorage.removeItem(STORAGE_KEY);
            }

            try {
                const payload = { language: 'en', visitor_name: 'Web Visitor' };
                if (ORG_ID) payload.organization_id = ORG_ID;
                if (ADMIN_ID) payload.admin_id = ADMIN_ID;
                if (WIDGET_ID) payload.widget_id = WIDGET_ID;

                const res = await fetch(API_BASE + '/api/webchat/start/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    sessionId = data.session.id;
                    localStorage.setItem(STORAGE_KEY, sessionId);
                    showSessionBadge(sessionId);
                    if (data.welcome_message) {
                        addMessage(data.welcome_message.content, 'bot');
                    }
                }
            } catch(e) {
                addMessage('Unable to connect. Please try again later.', 'bot');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || sending || !sessionId) return;

            input.value = '';
            addMessage(text, 'user');
            sending = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('typingIndicator').classList.add('active');
            scrollToBottom();

            try {
                const res = await fetch(API_BASE + '/api/webchat/message/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: text,
                        content_type: 'text'
                    })
                });
                const data = await res.json();
                document.getElementById('typingIndicator').classList.remove('active');
                if (data.success && data.bot_message) {
                    addMessage(data.bot_message.content, 'bot');
                    if (data.bot_message.images && data.bot_message.images.length > 0) {
                        data.bot_message.images.forEach(img => {
                            addImage(img.url, img.name);
                        });
                    }
                }
            } catch(e) {
                document.getElementById('typingIndicator').classList.remove('active');
                addMessage('Sorry, something went wrong. Please try again.', 'bot');
            }
            sending = false;
            document.getElementById('sendBtn').disabled = false;
        }

        function addMessage(text, sender, timestamp) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message ' + sender;

            // Render audio player if [Audio: url]
            const audioMatch = text.match(/^\[Audio:\s*(.*?)\]/i);
            if (audioMatch) {
                const audioUrl = audioMatch[1].trim();
                const rest = text.replace(audioMatch[0], '').trim();
                let html = '<div style="padding:4px 0;"><audio controls style="width:100%;max-width:240px;height:36px;" preload="metadata"><source src="' + audioUrl + '"></audio></div>';
                if (rest) html += '<div style="font-size:12px;opacity:0.7;margin-top:4px;">' + rest.replace(/\n/g, '<br>') + '</div>';
                div.innerHTML = html;
                container.appendChild(div);
                scrollToBottom();
                return;
            }

            // Auto-link URLs
            let html = text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:' + (sender === 'user' ? '#fff' : '#2563eb') + '; text-decoration:underline;">$1</a>');
            html = html.replace(/\n/g, '<br>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            let timeStr;
            if (timestamp) {
                const d = new Date(timestamp);
                timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
            } else {
                const now = new Date();
                timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
            }
            div.innerHTML = html + '<span class="time">' + timeStr + '</span>';
            container.appendChild(div);
            scrollToBottom();
        }

        function addImage(url, name) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = '<img src="' + url + '" alt="' + (name||'image') + '" class="msg-image">';
            container.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
        }

        // ---- File Upload ----
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file || !sessionId) return;
            const input = document.getElementById('messageInput');
            input.value = 'Uploading...';
            input.disabled = true;
            try {
                const fd = new FormData();
                fd.append('file', file);
                const res = await fetch(API_BASE + '/api/inbox/upload_media/', { method: 'POST', body: fd });
                const data = await res.json();
                if (res.ok && data.url) {
                    if (data.type === 'audio') {
                        // Send as audio message for transcription
                        addMessage('[Audio: ' + data.url + ']', 'user');
                        await sendAudioMessage(data.url);
                    } else {
                        addMessage('📎 ' + file.name, 'user');
                    }
                } else {
                    alert('Upload failed');
                }
            } catch(err) {
                alert('Upload error');
            } finally {
                input.disabled = false;
                input.value = '';
                e.target.value = '';
            }
        });

        // ---- Voice Recording (Record → Preview → Send/Delete) ----
        let _isRecording = false;
        let _recorder = null;
        let _chunks = [];
        let _recStream = null;
        let _recTimer = null;
        let _recSeconds = 0;
        let _pendingBlob = null;
        let _pendingMime = null;

        async function startRecording() {
            if (!sessionId) { addMessage('Please wait for the chat to connect.', 'bot'); return; }
            if (_isRecording) return;

            // Pre-checks
            if (!window.isSecureContext) {
                addMessage('🔒 Voice requires HTTPS. Please use https://', 'bot'); return;
            }
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                addMessage('⚠️ Your browser does not support audio recording.', 'bot'); return;
            }
            try {
                if (navigator.permissions && navigator.permissions.query) {
                    const ps = await navigator.permissions.query({ name: 'microphone' });
                    if (ps.state === 'denied') {
                        addMessage('🎤 Mic blocked. Click lock icon → Allow Microphone → Reload.', 'bot'); return;
                    }
                }
            } catch(e) {}

            try {
                _recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                _pendingMime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
                _recorder = new MediaRecorder(_recStream, { mimeType: _pendingMime });
                _chunks = [];

                _recorder.ondataavailable = (e) => { if (e.data.size > 0) _chunks.push(e.data); };

                _recorder.onstop = () => {
                    _isRecording = false;
                    clearInterval(_recTimer);
                    _recStream.getTracks().forEach(t => t.stop());

                    // Hide recording bar
                    document.getElementById('recordingBar').classList.remove('active');

                    const blob = new Blob(_chunks, { type: _pendingMime });
                    if (blob.size < 1000) {
                        showInputBar(); return;
                    }

                    // Store blob and show preview
                    _pendingBlob = blob;
                    const previewAudio = document.getElementById('previewAudio');
                    previewAudio.src = URL.createObjectURL(blob);

                    // Hide input bar, show preview bar
                    document.getElementById('chatInputBar').style.display = 'none';
                    document.getElementById('voicePreview').classList.add('active');
                };

                _recorder.start();
                _isRecording = true;
                _recSeconds = 0;

                // Show recording bar, hide input bar
                document.getElementById('chatInputBar').style.display = 'none';
                document.getElementById('recordingBar').classList.add('active');
                updateRecTimer();
                _recTimer = setInterval(updateRecTimer, 1000);

            } catch(err) {
                console.error('Mic error:', err);
                if (err.name === 'NotAllowedError') {
                    addMessage('🎤 Microphone denied. Click lock icon → Allow → Reload.', 'bot');
                } else if (err.name === 'NotFoundError') {
                    addMessage('🎤 No microphone found.', 'bot');
                } else {
                    addMessage('🎤 Mic error: ' + err.message, 'bot');
                }
            }
        }

        function updateRecTimer() {
            _recSeconds++;
            const m = Math.floor(_recSeconds / 60);
            const s = _recSeconds % 60;
            document.getElementById('recTimer').textContent = 'Recording... ' + m + ':' + s.toString().padStart(2, '0');
        }

        function stopRecording() {
            if (_recorder && _isRecording) _recorder.stop();
        }

        function showInputBar() {
            document.getElementById('voicePreview').classList.remove('active');
            document.getElementById('recordingBar').classList.remove('active');
            document.getElementById('chatInputBar').style.display = '';
        }

        function discardVoicePreview() {
            _pendingBlob = null;
            const pa = document.getElementById('previewAudio');
            if (pa.src) { URL.revokeObjectURL(pa.src); pa.src = ''; }
            showInputBar();
        }

        async function sendVoicePreview() {
            if (!_pendingBlob) return;
            const blob = _pendingBlob;
            _pendingBlob = null;

            // Clean up preview
            const pa = document.getElementById('previewAudio');
            if (pa.src) { URL.revokeObjectURL(pa.src); pa.src = ''; }
            showInputBar();

            // Show sending state
            addMessage('🎤 Sending voice note...', 'user');
            document.getElementById('typingIndicator').classList.add('active');
            scrollToBottom();

            try {
                // Upload
                const fd = new FormData();
                const ext = (_pendingMime || 'audio/webm').includes('webm') ? 'webm' : 'ogg';
                fd.append('file', blob, 'voice_note.' + ext);
                const uploadRes = await fetch(API_BASE + '/api/inbox/upload_media/', { method: 'POST', body: fd });
                const uploadData = await uploadRes.json();

                if (!uploadRes.ok || !uploadData.url) {
                    document.getElementById('typingIndicator').classList.remove('active');
                    removePlaceholder('Sending voice note');
                    addMessage('Upload failed. Try again.', 'bot');
                    return;
                }

                // Replace placeholder with audio player
                removePlaceholder('Sending voice note');
                addMessage('[Audio: ' + uploadData.url + ']', 'user');

                // Send to AI
                await sendAudioMessage(uploadData.url);
            } catch(err) {
                document.getElementById('typingIndicator').classList.remove('active');
                removePlaceholder('Sending voice note');
                addMessage('Voice note error. Try again.', 'bot');
            }
        }

        function removePlaceholder(text) {
            const msgs = document.querySelectorAll('#chatMessages .message.user');
            const last = msgs[msgs.length - 1];
            if (last && last.textContent.includes(text)) last.remove();
        }

        async function sendAudioMessage(audioUrl) {
            sending = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('typingIndicator').classList.add('active');
            try {
                const res = await fetch(API_BASE + '/api/webchat/message/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ session_id: sessionId, message: audioUrl, content_type: 'audio' })
                });
                const data = await res.json();
                document.getElementById('typingIndicator').classList.remove('active');
                if (data.success && data.bot_message) {
                    addMessage(data.bot_message.content, 'bot');
                    if (data.bot_message.images && data.bot_message.images.length > 0) {
                        data.bot_message.images.forEach(img => addImage(img.url, img.name));
                    }
                } else {
                    addMessage('Sorry, something went wrong.', 'bot');
                }
            } catch(err) {
                document.getElementById('typingIndicator').classList.remove('active');
                addMessage('Connection error.', 'bot');
            }
            sending = false;
            document.getElementById('sendBtn').disabled = false;
        }

        // Enter key to send
        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Start session on load
        startSession();
    </script>
</body>
</html>
