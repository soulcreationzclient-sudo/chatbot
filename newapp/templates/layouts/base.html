{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>{% block title %}Speedbots{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  {% block head_css %}{% endblock %}
  {% block head_js %}{% endblock %}
</head>

<body>

  <!-- Mobile topbar — lives OUTSIDE the flex layout so it doesn't break desktop -->
  <div class="topbar" id="topbarEl" style="display:none;">
    <button class="topbar-toggle" onclick="toggleSidebar()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#374151;line-height:1;">☰</button>
  </div>

  <!-- Sidebar overlay (mobile tap-outside to close) -->
  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <!-- Main shell -->
  <div style="display:flex; min-height:100vh;">

    <nav id="appSidebar">
      {% block sidebar %}
      {% include 'layouts/sidebar.html' %}
      {% endblock %}
    </nav>

    <main class="main-content" id="mainContent">
      <div class="page-content">
        {% block content %}{% endblock %}
      </div>
    </main>

  </div>

  {% block body_js %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% endblock %}

  <script>
    (function () {
      var overlay      = document.getElementById('sidebarOverlay');
      var innerSidebar = document.getElementById('sidebar');
      var topbarEl     = document.getElementById('topbarEl');
      var mainContent  = document.getElementById('mainContent');

      function isMobile() { return window.innerWidth < 1025; }

      // Show/hide topbar based on viewport
      function syncTopbar() {
        if (topbarEl) {
          topbarEl.style.display = isMobile() ? 'flex' : 'none';
        }
        // On mobile add top padding for topbar; on desktop remove it
        if (mainContent) {
          mainContent.style.paddingTop = isMobile() ? '72px' : '32px';
        }
      }
      syncTopbar();
      window.addEventListener('resize', syncTopbar);

      // On mobile, sidebar starts closed
      if (isMobile() && innerSidebar) {
        innerSidebar.classList.add('hidden');
      }

      function openSidebar() {
        if (innerSidebar) innerSidebar.classList.remove('hidden');
        if (overlay) overlay.classList.add('active');
      }
      function closeSidebar() {
        if (innerSidebar) innerSidebar.classList.add('hidden');
        if (overlay) overlay.classList.remove('active');
      }

      if (overlay) overlay.addEventListener('click', closeSidebar);

      window.toggleSidebar = function () {
        if (isMobile()) {
          if (innerSidebar && innerSidebar.classList.contains('hidden')) {
            openSidebar();
          } else {
            closeSidebar();
          }
        } else {
          // Desktop — toggle sidebar + shift main content
          if (innerSidebar) innerSidebar.classList.toggle('hidden');
          if (mainContent) mainContent.classList.toggle('full');
        }
      };
    })();
  </script>

</body>
</html>
