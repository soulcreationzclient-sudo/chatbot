{% extends "layouts/base.html" %}
{% block title %}Broadcast Message{% endblock %}

{% block content %}
<style>
  :root {
    --bg-card: #ffffff;
    --border-soft: #e5e7eb;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --accent: #3b82f6;
    --success: #22c55e;
  }

  /* This container ensures the form stays centered and bulky 
     but expands/contracts when the sidebar is toggled.
  */
  .broadcast-page-wrapper {
    padding: 40px 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100%;
  }

  .wrap-card {
    background: var(--bg-card);
    width: 100%;
    max-width: 1000px;
    padding: 48px;
    border-radius: 20px;
    border: 1px solid var(--border-soft);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    transition: all 0.3s ease;
    /* Matches sidebar transition speed */
  }

  .wrap-card h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-main);
    margin-bottom: 10px;
  }

  .desc {
    font-size: 16px;
    color: var(--text-muted);
    margin-bottom: 35px;
  }

  label {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 8px;
    display: block;
    color: var(--text-main);
  }

  input,
  select,
  textarea {
    width: 100%;
    font-size: 16px;
    padding: 14px 18px;
    margin-bottom: 24px;
    border: 2px solid var(--border-soft);
    border-radius: 12px;
    transition: all 0.2s;
    background-color: #fff;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
  }

  textarea {
    min-height: 220px;
    resize: vertical;
  }

  .actions {
    display: flex;
    justify-content: flex-end;
  }

  .btn-send {
    background: var(--success);
    background-color: #3b82f6;
    color: white;
    border: none;
    padding: 16px 45px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }

  .btn-send:hover {
    background: #16a34a;
  }

  .btn-send:active {
    transform: scale(0.98);
  }

  /* Responsive adjustment for small screens */
  @media (max-width: 768px) {
    .wrap-card {
      padding: 24px;
    }
  }
</style>

<div class="broadcast-page-wrapper">
  <div class="wrap-card">
    <h1>📢 Broadcast Message</h1>
    <p class="desc">Reach your audience instantly. Choose a segment, select your pre-approved WhatsApp template, and
      refine your message.</p>

    <form method="post" action="{% url 'send_broadcast' %}">
      {% csrf_token %}

      <label for="selected_tag">Recipient Segment (Tag):</label>
      <select id="selected_tag" name="selected_tag_name" required>
        <option value="" disabled selected>Select a contact tag...</option>
        {% for tag in tags %}
        <option value="{{ tag.name }}">{{ tag.name|capfirst }}</option>
        {% endfor %}
      </select>

      <label for="templateDropdown">WhatsApp Template:</label>
      <select id="templateDropdown" name="template_name" required>
        <option value="">Loading templates...</option>
      </select>

      <div class="actions">
        <button type="submit" class="btn-send">Send Broadcast</button>
      </div>
    </form>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    fetch('/api/whatsapp_templates/')
      .then(response => response.json())
      .then(data => {
        const dropdown = document.getElementById('templateDropdown');
        dropdown.innerHTML = '<option value="" disabled selected>Select template</option>';
        if (data.templates) {
          data.templates.forEach(name => {
            let opt = document.createElement('option');
            opt.value = name;
            opt.text = name.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            dropdown.appendChild(opt);
          });
        }
      })
      .catch(err => {
        console.error("Error fetching templates:", err);
        document.getElementById('templateDropdown').innerHTML = '<option value="">Error loading templates</option>';
      });
  });
</script>
{% endblock %}
