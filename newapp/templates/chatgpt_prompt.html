{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set ChatGPT Prompt</title>
  <style>
    :root {
      --sidebar-w: 250px;
      --bg-page: #f8fafc;
      --bg-card: #ffffff;
      --border-soft: #e5e7eb;

      --text-main: #0f172a;
      --text-muted: #64748b;

      --accent: #2563eb;
      --success: #22c55e;
    }

    body {
      margin: 0;
      background: var(--bg-page);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .main {
      margin-left: var(--sidebar-w);
      padding: 24px;
      padding-top: 100px;
      min-height: 100vh;
    }

    @media (max-width: 991.98px) {
      .main {
        margin-left: 0;
        padding: 16px;
        padding-top: 80px;
      }
    }

    .breadcrumb {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .breadcrumb a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .prompt-card {
      max-width: 800px;
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 8px;
      color: var(--text-main);
    }

    .desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      display: block;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      padding: 14px;
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      box-sizing: border-box;
      transition: border 0.2s ease, box-shadow 0.2s ease;
    }

    textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37,99,235, 0.15);
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--success);
      color: #fff;
    }

    .btn-primary:hover {
      background: #16a34a;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }
  </style>
</head>

<body>
  {% include 'layouts/sidebar.html' %}

  <div class="main">
    <div class="breadcrumb">
      <a href="{% url 'settings' %}">Settings</a> › <a href="{% url 'integration_view' %}">Integration</a> › ChatGPT
      Prompt
    </div>

    <div class="prompt-card">
      <h1>ChatGPT Prompt</h1>
      <p class="desc">Set the system prompt that will be used for all ChatGPT conversations.</p>

      <form method="POST">
        {% csrf_token %}

        <label for="prompt_text">System Prompt</label>
        <textarea name="prompt_text" id="prompt_text"
          placeholder="Enter your ChatGPT system prompt here...">{{ prompt }}</textarea>

        <div class="actions">
          <button type="submit" class="btn btn-primary">Save Prompt</button>
          <a href="{% url 'integration_view' %}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</body>

</html>
