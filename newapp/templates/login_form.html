{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in — SpeedBots</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f8fafc;
      color: #111827;
      display: grid;
      place-items: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Soft background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 480px; height: 480px; background: radial-gradient(circle, rgba(37,99,235,0.12), transparent 70%); top: -10%; right: -8%; }
    .orb-2 { width: 360px; height: 360px; background: radial-gradient(circle, rgba(251,113,133,0.08), transparent 70%); bottom: -8%; left: -8%; }

    .wrap {
      position: relative; z-index: 1;
      width: min(420px, 92vw);
    }

    /* Logo / brand */
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand-name {
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -1px; line-height: 1.2;
    }
    .brand-tag {
      display: block; font-size: 13px; color: #9ca3af; font-weight: 500; margin-top: 3px;
    }

    /* Card */
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 32px 30px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.07);
    }
    .card h2 { font-size: 1.15rem; font-weight: 700; color: #111827; margin-bottom: 3px; }
    .card .sub { font-size: 13px; color: #9ca3af; margin-bottom: 22px; }

    /* Messages */
    .messages { list-style: none; margin-bottom: 16px; }
    .messages li {
      padding: 10px 14px; border-radius: 10px; font-size: 13px;
      margin-bottom: 8px; background: #eff6ff; color: #dc2626; border: 1px solid #bfdbfe;
    }
    .messages li.success { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }

    /* Fields */
    .field {
      display: flex; align-items: center; gap: 10px;
      background: #f1f5f9; border: 1px solid #e5e7eb;
      border-radius: 12px; padding: 11px 14px; height: 46px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field:focus-within {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
      background: #fff;
    }
    .field + .field { margin-top: 12px; }
    .field input { border: 0; outline: 0; background: transparent; width: 100%; font-size: 14px; color: #111827; font-family: inherit; }
    .field input::placeholder { color: #9ca3af; }
    .field svg { width: 18px; height: 18px; color: #9ca3af; flex-shrink: 0; }
    .toggle { cursor: pointer; border: 0; background: transparent; padding: 0; display: flex; align-items: center; color: #9ca3af; }
    .toggle:hover { color: #6b7280; }

    /* Submit */
    .login-btn {
      width: 100%; height: 46px; border: 0; border-radius: 12px;
      margin-top: 18px;
      background: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
      color: #fff; font-weight: 700; font-size: 15px;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 14px rgba(37,99,235,0.28);
      transition: opacity 0.15s, transform 0.15s;
    }
    .login-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="wrap">
    <div class="brand">
      <span class="brand-name">SpeedBots</span>
      <span class="brand-tag">WhatsApp Automation Platform</span>
    </div>

    <div class="card">
      {% if messages %}
      <ul class="messages">
        {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %}

      <h2>Welcome back</h2>
      <p class="sub">Sign in to your account to continue</p>

      <form method="post">
        {% csrf_token %}

        <label class="field" for="id_username">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input id="id_username" name="username" type="text" placeholder="Username" required />
        </label>

        <label class="field" for="id_password">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="11" width="18" height="10" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input id="id_password" name="password" type="password" placeholder="Password" required />
          <button type="button" id="togglePwd" class="toggle" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </label>

        <button class="login-btn" type="submit">Sign in</button>
      </form>
    </div>
  </div>

  <script>
    (function () {
      const input = document.getElementById('id_password');
      const toggle = document.getElementById('togglePwd');
      let visible = false;
      toggle.addEventListener('click', function () {
        visible = !visible;
        input.type = visible ? 'text' : 'password';
        toggle.setAttribute('aria-label', visible ? 'Hide password' : 'Show password');
      });
    })();
  </script>
</body>
</html>
