<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book {{ link_name }} - SpeedBots</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
        }
        .calendly-container {
            width: 100%;
            min-height: 100vh;
        }
        /* Success overlay */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .success-overlay.show { display: flex; }
        .success-card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .success-icon { font-size: 64px; margin-bottom: 16px; }
        .success-card h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 8px; }
        .success-card p { color: #6b7280; line-height: 1.6; font-size: 15px; }
        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin: 4px;
            background: #dcfce7;
            color: #166534;
        }
        .footer-text {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
    <!-- Calendly embed CSS -->
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
</head>
<body>
    <!-- Calendly inline widget -->
    <div class="calendly-inline-widget calendly-container"
         data-url="{{ calendly_url }}"
         style="min-width:320px;height:100vh;"></div>

    <!-- Success overlay (shown after booking) -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-card">
            <div class="success-icon">&#10004;&#65039;</div>
            <h1>Booking Confirmed!</h1>
            <p id="successMessage">Your appointment has been scheduled successfully.</p>
            <div id="badgeContainer" style="margin-top:16px;"></div>
            <p style="margin-top:16px;color:#6b7280;">You can close this page now.</p>
            <div class="footer-text">Powered by SpeedBots</div>
        </div>
    </div>

    <!-- Calendly embed JS -->
    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js"></script>
    <script>
        // Listen for Calendly events
        window.addEventListener('message', function(e) {
            if (e.origin === 'https://calendly.com' && e.data.event) {
                console.log('[SpeedBots] Calendly event:', e.data.event);
                
                if (e.data.event === 'calendly.event_scheduled') {
                    console.log('[SpeedBots] Booking detected! Notifying server...');
                    notifyBookingConfirmed();
                }
            }
        });

        function notifyBookingConfirmed() {
            var token = '{{ booking_token }}';
            
            fetch('/booking-confirmed/' + token + '/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify({ token: token })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                console.log('[SpeedBots] Server response:', data);
                showSuccess(data);
            })
            .catch(function(err) {
                console.error('[SpeedBots] Error:', err);
                // Still show success to user even if server call failed
                showSuccess({ success: true, confirmation_sent: false });
            });
        }

        function showSuccess(data) {
            document.getElementById('successOverlay').classList.add('show');
            
            var badges = document.getElementById('badgeContainer');
            if (data.confirmation_sent) {
                badges.innerHTML += '<span class="badge">WhatsApp confirmation sent</span>';
            }
            if (data.custom_field_updated) {
                badges.innerHTML += '<span class="badge">Status updated</span>';
            }
            if (data.user_name && data.user_name !== 'there') {
                document.getElementById('successMessage').textContent = 
                    'Thank you ' + data.user_name + ', your appointment has been scheduled successfully.';
            }
        }
    </script>
</body>
</html>
